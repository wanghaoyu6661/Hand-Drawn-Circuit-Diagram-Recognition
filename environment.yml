name: hcd_pipeline_v2
# Portable runtime environment for public reproduction.
# Notes:
# 1) This file intentionally avoids platform/download-helper packages that caused
#    resolver conflicts in fresh AutoDL reproduction.
# 2) The canonical public setup entrypoint is this file (or environment.full.yml),
#    not a machine-specific pip freeze.
# 3) After creating the environment, install the OpenMMLab wheel stack with:
#       conda activate hcd_pipeline_v2
#       pip install -U openmim
#       mim install "mmcv==2.1.0"
#       pip install "mmengine==0.10.7" "mmdet==3.3.0" "mmpose==1.3.2" "mmpretrain==1.2.0"
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pip
  - pytorch=2.0.1
  - torchvision=0.15.2
  - torchaudio=2.0.2
  - pytorch-cuda=11.8
  - ffmpeg=6.1.1
  - tesseract=5.2.0
  - leptonica=1.82.0
  - numpy=1.26.4
  - scipy=1.13.1
  - scikit-image=0.21.0
  - scikit-learn=1.3.2
  - matplotlib=3.9.4
  - pillow=11.3.0
  - pyyaml=6.0.3
  - shapely=2.0.7
  - networkx=3.2.1
  - pandas=2.3.3
  - pip:
      - packaging==24.2
      - addict==2.4.0
      - chumpy==0.70
      - easydict==1.13
      - einops==0.8.1
      - filelock==3.14.0
      - git-filter-repo==2.47.0
      - h5py==3.11.0
      - huggingface-hub==1.1.5
      - imageio==2.35.1
      - json-tricks==3.17.3
      - kornia==0.7.3
      - kornia-rs==0.1.10
      - mat4py==0.6.0
      - model-index==0.1.11
      - modelindex==0.0.2
      - nltk==3.9.2
      - opencv-contrib-python==4.11.0.86
      - openmim==0.3.9
      - pycocotools==2.0.11
      - pycryptodome==3.23.0
      - python-json-logger==4.0.0
      - pytorch-lightning==2.0.9
      - pywavelets==1.4.1
      - requests==2.28.2
      - rich==13.4.2
      - safetensors==0.7.0
      - seaborn==0.13.2
      - tabulate==0.9.0
      - termcolor==3.1.0
      - terminaltables==3.1.10
      - timm==1.0.22
      - torchmetrics==0.11.4
