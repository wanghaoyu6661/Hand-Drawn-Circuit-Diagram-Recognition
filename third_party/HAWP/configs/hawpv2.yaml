DATALOADER:
  NUM_WORKERS: 8
DATASETS:
  AUGMENTATION: 3
  DISTANCE_TH: 0.025
  DISTANCE_TH_END: 0.025
  DISTANCE_TH_START: 0.04
  IMAGE:
    HEIGHT: 640
    PIXEL_MEAN:
    - 109.73
    - 103.832
    - 98.681
    PIXEL_STD:
    - 22.275
    - 22.124
    - 23.229
    TO_255: true
    WIDTH: 640
  NUM_STATIC_NEGATIVE_LINES: 10
  NUM_STATIC_POSITIVE_LINES: 40
  TARGET:
    HEIGHT: 320
    WIDTH: 320
  TEST:
  - wireframe_test
  TRAIN:
  - custom_train
  VAL:
  - custom_val
ENCODER:
  ANG_TH: 0.0
  BACKGROUND_WEIGHT: 0.0
  BACKGROUND_WEIGHT_END: 0.05
  BACKGROUND_WEIGHT_START: 0.1
  DIS_TH: 2
  NUM_STATIC_NEG_LINES: 10
  NUM_STATIC_POS_LINES: 40
MODEL:
  DEVICE: cuda
  FOCAL_LOSS:
    ALPHA: 0.25
    GAMMA: 2.0
  HEAD_SIZE:
  - - 3
  - - 1
  - - 1
  - - 2
  - - 2
  HGNETS:
    DEPTH: 4
    INPLANES: 64
    NUM_BLOCKS: 1
    NUM_FEATS: 128
    NUM_STACKS: 2
  LOI_POOLING:
    ACTIVATION: relu
    DIM_EDGE_FEATURE: 4
    DIM_FC: 512
    DIM_JUNCTION_FEATURE: 128
    LAYER_NORM: false
    NUM_POINTS: 32
    TYPE: softmax
    USE_INIT_LINES: true
  LOSS_WEIGHTS:
    # 只训练端点相关
    loss_jloc: 5.0
    loss_jloc_START: 5.0
    loss_jloc_END: 5.0

    loss_joff: 1.0
    loss_joff_START: 1.0
    loss_joff_END: 1.0

    # 下面这些都是线段 / HAFM / fc2 相关，全部减小数值，让其对整个训练影响更小。
    loss_md: 0.05
    loss_md_START: 0.05
    loss_md_END: 0.05

    loss_res: 0.05
    loss_res_START: 0.05
    loss_res_END: 0.05

    loss_pos: 0.1
    loss_pos_START: 0.1
    loss_pos_END: 0.1

    loss_neg: 0.1
    loss_neg_START: 0.1
    loss_neg_END: 0.1

    loss_aux: 0.05
    loss_lineness: 0.05
    loss_hafm: 0.05
  MIN_VALID_PAIRS: 1
  NAME: ResNets
  OUT_FEATURE_CHANNELS: 256
  PARSING_HEAD:
    DIM_FC: 1024
    DIM_LOI: 128
    J2L_THRESHOLD: 50.0
    J2L_THRESHOLD_END: 50.0
    J2L_THRESHOLD_START: 100.0
    JMATCH_THRESHOLD: 1.5
    JUNCTION_HM_THRESHOLD: 0.01
    MATCHING_STRATEGY: junction
    MAX_DISTANCE: 15.0
    MAX_DISTANCE_END: 12.0
    MAX_DISTANCE_START: 15.0
    N_DYN_JUNC: 250
    N_DYN_JUNC_END: 130
    N_DYN_JUNC_START: 250
    N_DYN_NEGL: 25
    N_DYN_NEGL_END: 15
    N_DYN_NEGL_START: 25
    N_DYN_OTHR: 0
    N_DYN_OTHR2: 300
    N_DYN_POSL: 60
    N_DYN_POSL_END: 80
    N_DYN_POSL_ENDPOS_MATCH_THRESHOLD_START: null
    N_DYN_POSL_START: 60
    N_OUT_JUNC: 250
    N_OUT_LINE: 800
    N_PTS0: 32
    N_PTS1: 8
    N_STC_NEGL: 10
    N_STC_POSL: 40
    POS_MATCH_THRESHOLD_END: 55.0
    POS_MATCH_THRESHOLD_START: 100.0
    USE_RESIDUAL: 1
  RESNETS:
    BASENET: resnet50
    PRETRAIN: true
  SCALE: 1.0
  USE_HR_JUNCTION: false
  USE_LINE_HEATMAP: false
  WEIGHTS: ''
MODELING_PATH: ihawp-v2
OUTPUT_DIR: /root/autodl-tmp/output_hawp_last/hawpv2/251108-170911
SOLVER:
  AMSGRAD: true
  BACKBONE_LR_FACTOR: 1.0
  BASE_LR: 0.0001
  BIAS_LR_FACTOR: 1
  CHECKPOINT_PERIOD: 1
  GAMMA: 0.1
  IMS_PER_BATCH: 4
  MAX_EPOCH: 35
  MOMENTUM: 0.9
  OPTIMIZER: ADAM
  STEPS:
  - 2000
  - 6000
  WEIGHT_DECAY: 0.0001
  WEIGHT_DECAY_BIAS: 0
