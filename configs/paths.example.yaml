# Public template for path configuration.
#
# Usage:
# 1) Copy this file to configs/paths.local.yaml (recommended), or configs/paths.yaml
# 2) Replace all occurrences of __PROJECT_ROOT__ with your actual project absolute path,
#    e.g. /home/yourname/Hand-Drawn-Circuit-Diagram-Recognition
#
# NOTE:
# - Keep the key names unchanged (scripts/run_all.sh depends on them).
# - This template assumes third-party repos and weights are placed under the project tree.

project_root: __PROJECT_ROOT__

# 外部依赖仓库（建议迁入项目内 third_party）
legacy:
  work_root: __PROJECT_ROOT__/outputs/run1
  runs_root: __PROJECT_ROOT__/outputs/run1/yolo_detect
  parseq_repo: __PROJECT_ROOT__/third_party/parseq-main
  # 如果 third_party/parseq-main 带 hubconf.py，可与 parseq_repo 相同
  parseq_torchhub_repo: __PROJECT_ROOT__/third_party/parseq-main
  hawp_repo: __PROJECT_ROOT__/third_party/HAWP
  mmpose_repo: __PROJECT_ROOT__/third_party/mmpose

paths:
  # ===== 输入（迁入项目内）=====
  src_img: __PROJECT_ROOT__/data/inputs
  classes_txt: __PROJECT_ROOT__/assets/meta/classes.txt
  yolo_data_yaml: __PROJECT_ROOT__/configs/yolo_data.yaml

  # ===== 项目内输出（run1）=====
  src_img_scanned: __PROJECT_ROOT__/outputs/run1/src_img_scanned

  # YOLO 检测输出
  yolo_detect_exp: __PROJECT_ROOT__/outputs/run1/yolo_detect/exp
  yolo_labels: __PROJECT_ROOT__/outputs/run1/yolo_detect/exp/labels
  yolo_crops: __PROJECT_ROOT__/outputs/run1/yolov10_crops

  # OCR 融合输出
  fuse_json: __PROJECT_ROOT__/outputs/run1/fuse_json

  # 元件区域抑制输出（原 lama_clean）
  suppressed_img: __PROJECT_ROOT__/outputs/run1/suppressed_img

  # HAWP 输出（脚本里读取 json 子目录；run_all 里 HAWP 输出根目录应为 HAWPimg）
  hawp_json: __PROJECT_ROOT__/outputs/run1/HAWPimg/json

  # 合并点输出
  merged_points_vis: __PROJECT_ROOT__/outputs/run1/merged_points/merged_points_vis
  merged_points_json: __PROJECT_ROOT__/outputs/run1/merged_points/merged_points_json

  # 去组件 / 导线增强输出
  dao_xian: __PROJECT_ROOT__/outputs/run1/dao_xian

  # 连接推理输出
  link_root: __PROJECT_ROOT__/outputs/run1/link
  link_json: __PROJECT_ROOT__/outputs/run1/link/json

  # 类型细化 / 端点语义输出
  type_refine_json: __PROJECT_ROOT__/outputs/run1/type_refine/json
  ports_cls_json: __PROJECT_ROOT__/outputs/run1/ports_cls/json

  # 最终结果输出
  final_result_root: __PROJECT_ROOT__/outputs/run1/final_result

  # 新增：由 build_spice_netlists.py 自动创建并写入 .spice 网表
  spice_netlists: __PROJECT_ROOT__/outputs/run1/spice_netlists

  # 共享静态资源（建议固定在 assets，而不是每个 run 都复制）
  font_dir: __PROJECT_ROOT__/assets/fonts

weights:
  # YOLO
  yolo_best: __PROJECT_ROOT__/weights/yolo/best.pt

  # PARSeq
  parseq_ckpt: __PROJECT_ROOT__/weights/parseq/best_parseq.pt
  parseq_charset: __PROJECT_ROOT__/assets/meta/parseq_charset.txt

  # HAWP（cfg + ckpt）
  hawp_cfg: __PROJECT_ROOT__/weights/hawp/config.yaml
  hawp_ckpt: __PROJECT_ROOT__/weights/hawp/last_epoch_035.pth

  # DINOv2 子类型分类权重
  bjt_ckpt: __PROJECT_ROOT__/weights/dinov2/best_bjt_partial_ft.pt
  fet_ckpt: __PROJECT_ROOT__/weights/dinov2/best_mosfet_partial_ft.pt
  dcsrc_ckpt: __PROJECT_ROOT__/weights/dinov2/best_dcsrc_partial_ft.pt

  # ViTPose（自定义 cfg 建议放在主仓库 configs/mmpose_ports，避免 third_party/mmpose 子模块遗漏）
  pose3k_cfg: __PROJECT_ROOT__/configs/mmpose_ports/vitpose_l_ports_3k_256x192_fix.py
  pose3k_wts: __PROJECT_ROOT__/weights/vitpose/best_coco_AP_epoch_29.pth
  pose2k_cfg: __PROJECT_ROOT__/configs/mmpose_ports/vitpose_l_ports_2k_256x192_fix.py
  pose2k_wts: __PROJECT_ROOT__/weights/vitpose/best_coco_AP_epoch_30.pth
