project_root: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition

# 外部依赖仓库（建议迁入项目内 third_party）
legacy:
  work_root: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1
  runs_root: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/yolo_detect
  parseq_repo: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/third_party/parseq-main
  # 如果 third_party/parseq-main 带 hubconf.py，可与 parseq_repo 相同
  parseq_torchhub_repo: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/third_party/parseq-main
  hawp_repo: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/third_party/HAWP
  mmpose_repo: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/third_party/mmpose

paths:
  # ===== 输入（迁入项目内）=====
  src_img: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/data/inputs
  classes_txt: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/assets/meta/classes.txt
  yolo_data_yaml: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/configs/yolo_data.yaml

  # ===== 项目内输出（run1）=====
  src_img_scanned: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/src_img_scanned

  # YOLO 检测输出
  yolo_detect_exp: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/yolo_detect/exp
  yolo_labels: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/yolo_detect/exp/labels
  yolo_crops: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/yolov10_crops

  # OCR 融合输出
  fuse_json: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/fuse_json

  # 元件区域抑制输出（原 lama_clean）
  suppressed_img: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/suppressed_img

  # HAWP 输出（脚本里读取 json 子目录；run_all 里 HAWP 输出根目录应为 HAWPimg）
  hawp_json: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/HAWPimg/json

  # 合并点输出
  merged_points_vis: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/merged_points/merged_points_vis
  merged_points_json: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/merged_points/merged_points_json

  # 去组件 / 导线增强输出
  dao_xian: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/dao_xian

  # 连接推理输出
  link_root: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/link
  link_json: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/link/json

  # 类型细化 / 端点语义输出
  type_refine_json: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/type_refine/json
  ports_cls_json: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/ports_cls/json

  # 最终结果输出
  final_result_root: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/final_result

  # 新增：由 build_spice_netlists.py 自动创建并写入 .spice 网表
  spice_netlists: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/outputs/run1/spice_netlists

  # 共享静态资源（建议固定在 assets，而不是每个 run 都复制）
  font_dir: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/assets/fonts

weights:
  # YOLO
  yolo_best: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/weights/yolo/best.pt

  # PARSeq
  parseq_ckpt: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/weights/parseq/best_parseq.pt
  parseq_charset: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/assets/meta/parseq_charset.txt

  # HAWP（cfg + ckpt）
  hawp_cfg: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/weights/hawp/config.yaml
  hawp_ckpt: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/weights/hawp/last_epoch_035.pth

  # DINOv2 子类型分类权重
  bjt_ckpt: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/weights/dinov2/best_bjt_partial_ft.pt
  fet_ckpt: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/weights/dinov2/best_mosfet_partial_ft.pt
  dcsrc_ckpt: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/weights/dinov2/best_dcsrc_partial_ft.pt

  # ViTPose（自定义 cfg 建议放在主仓库 configs/mmpose_ports，避免 third_party/mmpose 子模块遗漏）
  pose3k_cfg: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/configs/mmpose_ports/vitpose_l_ports_3k_256x192_fix.py
  pose3k_wts: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/weights/vitpose/best_coco_AP_epoch_29.pth
  pose2k_cfg: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/configs/mmpose_ports/vitpose_l_ports_2k_256x192_fix.py
  pose2k_wts: /root/autodl-tmp/Hand-Drawn-Circuit-Diagram-Recognition/weights/vitpose/best_coco_AP_epoch_30.pth
